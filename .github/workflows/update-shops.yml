name: Weekly Coffee Shop Update

on:
  schedule:
    # Every Monday at 9:00 AM ET (14:00 UTC)
    - cron: '0 14 * * 1'
  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Run shop update agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run update agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-shops.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/data/shops.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to shops.ts — skipping PR."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            SHOP_COUNT=$(grep -c "^  {" src/data/shops.ts || true)
            echo "count=$SHOP_COUNT" >> $GITHUB_OUTPUT
            echo "shops.ts changed ($SHOP_COUNT shops total)."
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/weekly-shop-update
          delete-branch: true
          commit-message: 'chore: weekly Atlanta coffee shop data update'
          title: 'Weekly Coffee Shop Update (${{ steps.diff.outputs.count }} shops)'
          labels: automated, data-update
          body: |
            ## Weekly Coffee Shop Data Update

            This PR was automatically generated by the weekly shop update agent on **${{ github.run_id }}**.

            The agent used Claude (`claude-sonnet-4-6`) to research the Atlanta specialty coffee scene and suggest additions or rating updates to `src/data/shops.ts`.

            ### Before merging, please verify:
            - [ ] All new shops are real and currently operating
            - [ ] Addresses, hours, and descriptions look accurate
            - [ ] No existing shops were unintentionally removed or modified
            - [ ] `npm run build` passes locally (TypeScript was validated by the agent, but a quick check is good)

            > ⚠️ AI-generated data should always be reviewed before publishing. This PR will never auto-merge.
